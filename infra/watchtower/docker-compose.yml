version: '3.8'

services:
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower_global
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "ps aux | grep -q watchtower || exit 1"]
      interval: 1m
      timeout: 15s
      retries: 3
      start_period: 60s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=3600
      - WATCHTOWER_INCLUDE_STOPPED=true
      - WATCHTOWER_REVIVE_STOPPED=true
      - WATCHTOWER_LABEL_ENABLE=true
    networks:
      - infra_net

networks:
  infra_net:
    driver: bridge
    name: infra_net
