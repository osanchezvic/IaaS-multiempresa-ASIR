version: '3.8'

services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer_global
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9443:9443"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - infra_net

volumes:
  portainer_data:

networks:
  infra_net:
    driver: bridge
    name: infra_net
