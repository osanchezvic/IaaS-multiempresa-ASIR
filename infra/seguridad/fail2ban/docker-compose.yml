version: '3.8'

services:
  fail2ban:
    image: crazymax/fail2ban:latest
    container_name: fail2ban_global
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "pgrep -f fail2ban-server >/dev/null"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - /var/log:/var/log:ro
      - ./jail.local:/etc/fail2ban/jail.local:ro
      - fail2ban_data:/var/lib/fail2ban
    environment:
      - F2B_LOG_LEVEL=INFO
      - F2B_DB_PURGE_AGE=30d

volumes:
  fail2ban_data: