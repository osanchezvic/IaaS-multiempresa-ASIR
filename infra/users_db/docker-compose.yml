version: '3.8'

services:
  users_db:
    image: mariadb:latest
    container_name: infra_users_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secure_pass}
      MYSQL_DATABASE: ${DB_NAME:-users_db}
      MYSQL_USER: ${DB_USER:-users_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-users_pass}
      MYSQL_INITDB_SKIP_TZINFO: 'yes'
    volumes:
      - users_db_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./init_data.sql:/docker-entrypoint-initdb.d/02-init-data.sql
    ports:
      - "${DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_secure_pass}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infra_network

volumes:
  users_db_data:
    driver: local

networks:
  infra_network:
    driver: bridge
