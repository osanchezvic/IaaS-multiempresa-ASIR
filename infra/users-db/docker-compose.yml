version: '3.8'

services:
  users-db:
    image: mariadb:10.11
    container_name: infra_users_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 'infra_root_pass'
      MYSQL_DATABASE: 'users_db'
      MYSQL_USER: 'users_user'
      MYSQL_PASSWORD: 'users_pass'
    volumes:
      - ./users-db-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - infra_net
    ports:
      - "3307:3306"  # Puerto interno para acceso

networks:
  infra_net:
    external: true

volumes:
  users-db-data: